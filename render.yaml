services:
  - type: web
    name: edurpg-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add these in Render dashboard → Environment tab:
      # HUGGING_FACE_API_KEY = hf_your_key
      # FRONTEND_URL         = https://your-app.vercel.app
    healthCheckPath: /health
    autoDeploy: true